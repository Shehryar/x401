<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title }} — x401</title>
<meta name="description" content="{{ page.description | default: site.description }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
<nav class="nav">
  <a href="{{ '/' | relative_url }}" class="nav-logo">x401</a>
  <div class="nav-links">
    <a href="{{ '/whitepaper' | relative_url }}" {% if page.url == '/whitepaper' %}class="active"{% endif %}>White Paper</a>
    <a href="{{ '/design' | relative_url }}" {% if page.url == '/design' %}class="active"{% endif %}>Design Doc</a>
    <a href="https://github.com/Shehryar/x401" target="_blank">GitHub</a>
  </div>
</nav>

<article class="doc">
  {{ content }}
</article>

<footer class="footer">
  <p>x401 is an open protocol.</p>
</footer>
</body>
</html>
